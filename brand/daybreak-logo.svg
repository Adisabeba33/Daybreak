<svg xmlns="http://www.w3.org/2000/svg" width="1536" height="1536" viewBox="0 0 1536 1536" role="img" aria-label="Daybreak logo">
  <defs>
    <linearGradient id="dGrad" x1="612" y1="400" x2="922" y2="740" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F4A15C"/>
      <stop offset="0.5" stop-color="#D98A42"/>
      <stop offset="1" stop-color="#9F5D2D"/>
    </linearGradient>
    <linearGradient id="sunGrad" x1="768" y1="555" x2="768" y2="612" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F7B36C"/>
      <stop offset="1" stop-color="#C87532"/>
    </linearGradient>
    <linearGradient id="rayGrad" x1="768" y1="490" x2="768" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E7A75A"/>
      <stop offset="1" stop-color="#D0873C"/>
    </linearGradient>
  </defs>

  <!-- ===== Monogram: elegant D with sunrise, rays, horizon waves ===== -->
  <g fill="none" stroke="url(#dGrad)" stroke-linecap="round" stroke-linejoin="round">
    <!-- stem + serifs -->
    <path d="M628 400 L628 736" stroke-width="5"/>
    <path d="M604 400 L654 400" stroke-width="4.4"/>
    <path d="M604 736 L654 736" stroke-width="4.4"/>
    <!-- bowl -->
    <path d="M636 400 C812 400 922 476 922 566 C922 672 812 736 664 736" stroke-width="5"/>
  </g>

  <!-- rays -->
  <g fill="none" stroke="url(#rayGrad)" stroke-width="3.6" stroke-linecap="round">
    <line x1="768" y1="548" x2="768" y2="490"/>
    <line x1="784.06" y1="550.1" x2="797.5" y2="499.9"/>
    <line x1="751.94" y1="550.1" x2="738.5" y2="499.9"/>
    <line x1="799" y1="556.3" x2="821" y2="518.2"/>
    <line x1="737" y1="556.3" x2="715" y2="518.2"/>
    <line x1="811.8" y1="566.2" x2="835.9" y2="542.1"/>
    <line x1="724.2" y1="566.2" x2="700.1" y2="542.1"/>
    <line x1="821.7" y1="579" x2="842.5" y2="567"/>
    <line x1="714.3" y1="579" x2="693.5" y2="567"/>
  </g>

  <!-- sun (half disc) -->
  <path d="M713 610 A55 55 0 0 1 823 610 Z" fill="url(#sunGrad)"/>

  <!-- horizon waves (in front of sun base) -->
  <g fill="none" stroke-linecap="round">
    <path d="M650 616 C700 605 745 625 785 616 C830 606 866 623 898 611" stroke="#B97034" stroke-width="5"/>
    <path d="M676 641 C720 632 760 648 800 640 C840 633 868 645 888 636" stroke="#D9974D" stroke-width="3.4"/>
    <path d="M702 662 C740 655 775 665 812 659" stroke="#E2B56F" stroke-width="2.4"/>
  </g>

  <!-- ===== Wordmark ===== -->
  <text x="768" y="896" text-anchor="middle"
        font-family="'Cormorant Garamond', 'Playfair Display', Georgia, serif"
        font-size="120" font-weight="600" letter-spacing="34" fill="#2B241F">DAYBREAK</text>

  <!-- ===== Tagline ===== -->
  <text x="774" y="972" text-anchor="middle"
        font-family="'Inter', -apple-system, 'Segoe UI', sans-serif"
        font-size="24" font-weight="500" letter-spacing="12" fill="#D47B3D">A NEW DAY. A BETTER YOU.</text>

  <!-- ===== Divider ===== -->
  <g stroke="#D9974D" stroke-linecap="round" fill="none">
    <line x1="573" y1="1046" x2="703" y2="1046" stroke-width="2"/>
    <line x1="833" y1="1046" x2="963" y2="1046" stroke-width="2"/>
    <g stroke-width="2">
      <path d="M756 1050 A12 12 0 0 1 780 1050"/>
      <line x1="768" y1="1035" x2="768" y2="1029"/>
      <line x1="758.5" y1="1037.5" x2="755.5" y2="1032"/>
      <line x1="777.5" y1="1037.5" x2="780.5" y2="1032"/>
      <line x1="751" y1="1043.5" x2="746.5" y2="1040"/>
      <line x1="785" y1="1043.5" x2="789.5" y2="1040"/>
    </g>
  </g>
</svg>
